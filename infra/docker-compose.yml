services:
  api:
    build: ..
    command: npm run start:dev
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"  
      WATCHPACK_POLLING: "true"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/orders
      REDIS_HOST: redis
    volumes:
      - ../:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    ports:
      - "5432:5432"

  redis:
    image: redis:8
    ports:
      - "6379:6379"